<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tictac.css">
</head>
<body>

    <!-- Player name modal, shown before every fresh match -->
    <div class="modal-overlay" id="nameModal">
        <div class="modal">
            <h2>Ready to play?</h2>
            <p class="modal-sub">Enter both player names to start the match.</p>

            <div class="modal-field">
                <label for="playerXName">Player X</label>
                <input type="text" id="playerXName" placeholder="Player 1" maxlength="12">
            </div>

            <div class="modal-field">
                <label for="playerOName">Player O</label>
                <input type="text" id="playerOName" placeholder="Player 2" maxlength="12">
            </div>

            <button class="btn-primary" id="startGameBtn">Start game</button>
        </div>
    </div>

    <div class="app">

        <header class="topbar">
            <h1>TIC TAC TOE</h1>
            <div class="topbar-actions">
                <button class="icon-btn" id="soundToggle" aria-label="Mute sounds" title="Mute sounds">&#128266;</button>
                <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">&#127769;</button>
            </div>
        </header>

        <section class="scoreboard" aria-label="Scoreboard">
            <div class="score-card score-x">
                <span class="score-label" id="scoreXLabel">Player X</span>
                <span class="score-value" id="scoreXValue">0</span>
            </div>
            <div class="score-card score-draw">
                <span class="score-label">Draws</span>
                <span class="score-value" id="scoreDrawValue">0</span>
            </div>
            <div class="score-card score-o">
                <span class="score-label" id="scoreOLabel">Player O</span>
                <span class="score-value" id="scoreOValue">0</span>
            </div>
        </section>

        <p class="round-indicator" id="roundIndicator">Round 1</p>
        <p class="turn-indicator" id="turnIndicator">Player X's turn</p>

        <div class="main" id="board">
            <button class="tic" id="1"></button>
            <button class="tic" id="2"></button>
            <button class="tic" id="3"></button>
            <button class="tic" id="4"></button>
            <button class="tic" id="5"></button>
            <button class="tic" id="6"></button>
            <button class="tic" id="7"></button>
            <button class="tic" id="8"></button>
            <button class="tic" id="9"></button>
        </div>

        <p class="result-banner" id="resultBanner" aria-live="polite"></p>

        <div class="controls">
            <button class="btn-secondary" id="restartBtn">Restart round</button>
            <button class="btn-secondary" id="newMatchBtn">New match</button>
        </div>

    </div>

<script src="tictac.js"></script>
</body>
</html>
